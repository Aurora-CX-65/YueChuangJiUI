<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <!-- 定义渐变和滤镜 -->
    <defs>
        <!-- 主粉色渐变 - 保持原有主题色 -->
        <linearGradient id="main-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFB6C1"/>
            <stop offset="100%" stop-color="#FF69B4"/>
        </linearGradient>

        <!-- 书本渐变 -->
        <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFC0CB"/>
            <stop offset="100%" stop-color="#FF69B4"/>
        </linearGradient>

        <!-- 笔渐变 -->
        <linearGradient id="pen-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700"/>
            <stop offset="100%" stop-color="#FFA500"/>
        </linearGradient>

        <!-- 文字渐变 -->
        <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#FFE4E1"/>
        </linearGradient>

        <!-- 品牌名渐变 -->
        <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF69B4"/>
            <stop offset="100%" stop-color="#FF1493"/>
        </linearGradient>

        <!-- 阴影效果 -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- 背景圆形 -->
    <circle cx="40" cy="40" r="35" fill="url(#main-gradient)" filter="url(#shadow)"/>

    <!-- 书本形状 - 代表阅读 -->
    <g transform="translate(25, 25)">
        <!-- 书本主体 -->
        <rect x="0" y="0" width="30" height="25" rx="2" ry="2" fill="url(#book-gradient)"/>

        <!-- 书页细节 -->
        <rect x="14" y="0" width="1" height="25" fill="#FFFFFF" opacity="0.4"/>
        <rect x="3" y="3" width="24" height="2" rx="1" ry="1" fill="#FFFFFF" opacity="0.3"/>
        <rect x="3" y="8" width="21" height="2" rx="1" ry="1" fill="#FFFFFF" opacity="0.3"/>
        <rect x="3" y="13" width="18" height="2" rx="1" ry="1" fill="#FFFFFF" opacity="0.3"/>
        <rect x="3" y="18" width="15" height="2" rx="1" ry="1" fill="#FFFFFF" opacity="0.3"/>
    </g>

    <!-- 笔的形状 - 代表创作 -->
    <g transform="translate(45, 15)">
        <!-- 笔杆 -->
        <path d="M0 0 L10 -10" stroke="url(#pen-gradient)" stroke-width="3" stroke-linecap="round"/>
        <path d="M10 -10 L8 -15" stroke="url(#pen-gradient)" stroke-width="2" stroke-linecap="round"/>

        <!-- 笔尖 -->
        <polygon points="0 0, 3 -3, -3 -3" fill="#FFA500"/>

        <!-- 笔握部分 -->
        <circle cx="0" cy="0" r="2" fill="#FFFFFF" opacity="0.9"/>
    </g>

    <!-- 文字符号 - 代表文学创作 -->
    <text x="40" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
          text-anchor="middle" fill="url(#text-gradient)">文</text>

    <!-- 品牌名称 "阅创集" -->
    <text x="85" y="45" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold"
          text-anchor="middle" fill="url(#brand-gradient)">阅创集</text>

    <!-- 品牌标语 -->
    <text x="85" y="60" font-family="Microsoft YaHei, sans-serif" font-size="8"
          text-anchor="middle" fill="#FF69B4" opacity="0.8">阅读创作一体化平台</text>
</svg>