<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="444" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变 -->
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd6e0" />
      <stop offset="50%" stop-color="#ffb3cc" />
      <stop offset="100%" stop-color="#ff8fb1" />
    </linearGradient>
    
    <!-- 圆形装饰渐变 -->
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </radialGradient>
    
    <!-- 条纹渐变 -->
    <linearGradient id="stripesGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8fb1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff8fb1" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="444" height="630" rx="8" ry="8" fill="url(#bgGradient)" />
  
  <!-- 角落标记 -->
  <g stroke="#ffffff" stroke-width="2" fill="none">
    <rect x="20" y="20" width="15" height="15" />
    <rect x="409" y="20" width="15" height="15" />
    <rect x="20" y="595" width="15" height="15" />
    <rect x="409" y="595" width="15" height="15" />
  </g>
  
  <!-- 左上角圆形装饰 -->
  <circle cx="120" cy="180" r="80" fill="url(#circleGradient)" />
  
  <!-- 右上角条纹装饰 -->
  <g transform="translate(320, 160)">
    <rect x="0" y="0" width="40" height="12" rx="2" ry="2" fill="url(#stripesGradient)" />
    <rect x="0" y="16" width="40" height="12" rx="2" ry="2" fill="url(#stripesGradient)" />
    <rect x="0" y="32" width="40" height="12" rx="2" ry="2" fill="url(#stripesGradient)" />
    <rect x="0" y="48" width="40" height="12" rx="2" ry="2" fill="url(#stripesGradient)" />
    <rect x="0" y="64" width="40" height="12" rx="2" ry="2" fill="url(#stripesGradient)" />
  </g>
  
  <!-- 右下角方形装饰 -->
  <rect x="350" y="480" width="60" height="60" rx="4" ry="4" fill="#ffffff" fill-opacity="0.3" />
  
  <!-- 底部波浪线 -->
  <path d="M40,520 C120,480 180,540 220,520 C260,500 320,560 400,520" 
        stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" />
  
  <!-- 底部小圆点 -->
  <g fill="#ffffff" fill-opacity="0.6">
    <circle cx="200" cy="540" r="4" />
    <circle cx="220" cy="530" r="3" />
    <circle cx="240" cy="545" r="5" />
    <circle cx="260" cy="535" r="3" />
    <circle cx="280" cy="540" r="4" />
  </g>
  
  <!-- 文字内容 -->
  <g font-family="Arial, sans-serif" text-anchor="middle" fill="#ffffff">
    <!-- 书籍标题 -->
    <text x="222" y="280" font-size="28" font-weight="bold">书籍标题</text>
    
    <!-- 副标题 -->
    <text x="222" y="320" font-size="16" font-weight="normal">副标题或系列名称</text>
    
    <!-- 作者姓名 -->
    <text x="222" y="360" font-size="18" font-weight="normal">作者姓名</text>
    
    <!-- 分割线 -->
    <line x1="172" y1="390" x2="272" y2="390" stroke="#ffffff" stroke-width="1" stroke-opacity="0.7" />
    
    <!-- 出版社名称 -->
    <text x="222" y="420" font-size="14" font-weight="normal">出版社名称</text>
  </g>
  
  <!-- 底部水印 -->
  <text x="420" y="620" font-family="Arial, sans-serif" font-size="10" 
        text-anchor="end" fill="#ffffff" fill-opacity="0.5">豆包AI生成</text>
</svg>